<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone Assault Arcade</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0b1020;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    #gameWrap {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    canvas {
      background: linear-gradient(#77b7df, #cde7f5 58%, #586b42 59%, #2e3f2d);
      border: 4px solid #111827;
      box-shadow: 0 12px 40px rgba(0,0,0,.45);
      max-width: 100vw;
      max-height: 90vh;
    }
    .help {
      font-size: 14px;
      color: #cbd5e1;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="gameWrap">
    <canvas id="game" width="1000" height="560"></canvas>
    <div class="help">Move: A/D or ←/→ · Jump: W/Space/↑ · Aim: Mouse · Shoot: Click · Restart: R</div>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const keys = {};
let mouse = { x: 500, y: 280, down: false };
let gameOver = false;
let score = 0;
let wave = 1;
let lastShot = 0;
let spawnTimer = 0;

const player = {
  x: 120, y: 420, w: 34, h: 54,
  vx: 0, vy: 0, speed: 5,
  hp: 100, grounded: false,
  facing: 1
};

const bullets = [];
const enemyBullets = [];
const helis = [];
const particles = [];

const groundY = 470;

window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key.toLowerCase() === 'r' && gameOver) restart();
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * canvas.width / r.width;
  mouse.y = (e.clientY - r.top) * canvas.height / r.height;
});
canvas.addEventListener('mousedown', () => mouse.down = true);
canvas.addEventListener('mouseup', () => mouse.down = false);

function restart() {
  gameOver = false;
  score = 0;
  wave = 1;
  player.x = 120; player.y = 420; player.vx = 0; player.vy = 0; player.hp = 100;
  bullets.length = 0; enemyBullets.length = 0; helis.length = 0; particles.length = 0;
}

function spawnHeli() {
  const side = Math.random() < 0.5 ? -1 : 1;
  helis.push({
    x: side < 0 ? -90 : canvas.width + 90,
    y: 70 + Math.random() * 170,
    w: 88, h: 34,
    vx: side < 0 ? 1.6 + wave * 0.18 : -1.6 - wave * 0.18,
    hp: 35 + wave * 8,
    fireCooldown: 60 + Math.random() * 80,
    bob: Math.random() * Math.PI * 2
  });
}

function shoot() {
  const now = performance.now();
  if (now - lastShot < 130) return;
  lastShot = now;
  const cx = player.x + player.w / 2;
  const cy = player.y + 24;
  const angle = Math.atan2(mouse.y - cy, mouse.x - cx);
  bullets.push({ x: cx, y: cy, vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12, r: 4, life: 80 });
}

function explode(x, y, amount = 20) {
  for (let i = 0; i < amount; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 30 + Math.random() * 25, r: 2 + Math.random() * 4 });
  }
}

function rectHit(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function circleRectHit(c, r) {
  const nx = Math.max(r.x, Math.min(c.x, r.x + r.w));
  const ny = Math.max(r.y, Math.min(c.y, r.y + r.h));
  return Math.hypot(c.x - nx, c.y - ny) < c.r;
}

function update() {
  if (gameOver) return;

  player.vx = 0;
  if (keys['a'] || keys['arrowleft']) player.vx = -player.speed;
  if (keys['d'] || keys['arrowright']) player.vx = player.speed;
  if ((keys['w'] || keys[' '] || keys['arrowup']) && player.grounded) {
    player.vy = -13;
    player.grounded = false;
  }
  if (mouse.down) shoot();

  player.vy += 0.6;
  player.x += player.vx;
  player.y += player.vy;
  player.x = Math.max(10, Math.min(canvas.width - player.w - 10, player.x));
  if (player.y + player.h >= groundY) {
    player.y = groundY - player.h;
    player.vy = 0;
    player.grounded = true;
  }

  spawnTimer--;
  if (spawnTimer <= 0) {
    spawnHeli();
    spawnTimer = Math.max(45, 130 - wave * 8);
  }
  wave = 1 + Math.floor(score / 500);

  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy; b.life--;
    if (b.life <= 0 || b.x < -20 || b.x > canvas.width + 20 || b.y < -20 || b.y > canvas.height + 20) bullets.splice(i, 1);
  }

  for (let i = helis.length - 1; i >= 0; i--) {
    const h = helis[i];
    h.x += h.vx;
    h.bob += 0.06;
    h.y += Math.sin(h.bob) * 0.35;
    h.fireCooldown--;

    if (h.fireCooldown <= 0) {
      const angle = Math.atan2((player.y + 25) - h.y, (player.x + 15) - h.x);
      enemyBullets.push({ x: h.x + h.w/2, y: h.y + h.h/2, vx: Math.cos(angle) * 5.3, vy: Math.sin(angle) * 5.3, r: 5, life: 150 });
      h.fireCooldown = 70 + Math.random() * 80 - wave * 2;
    }

    for (let j = bullets.length - 1; j >= 0; j--) {
      if (circleRectHit(bullets[j], h)) {
        h.hp -= 18;
        bullets.splice(j, 1);
        explode(h.x + h.w/2, h.y + h.h/2, 4);
        if (h.hp <= 0) {
          explode(h.x + h.w/2, h.y + h.h/2, 32);
          helis.splice(i, 1);
          score += 100;
          break;
        }
      }
    }
    if (h && (h.x < -180 || h.x > canvas.width + 180)) helis.splice(i, 1);
  }

  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy; b.life--;
    if (circleRectHit(b, player)) {
      enemyBullets.splice(i, 1);
      player.hp -= 12;
      explode(player.x + player.w/2, player.y + player.h/2, 8);
      if (player.hp <= 0) gameOver = true;
      continue;
    }
    if (b.life <= 0 || b.y > canvas.height + 30 || b.x < -30 || b.x > canvas.width + 30) enemyBullets.splice(i, 1);
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawSoldier() {
  const cx = player.x + player.w / 2;
  const cy = player.y + 24;
  const angle = Math.atan2(mouse.y - cy, mouse.x - cx);

  ctx.fillStyle = '#1f2937';
  ctx.fillRect(player.x, player.y + 18, player.w, 34);
  ctx.fillStyle = '#f4c29f';
  ctx.beginPath(); ctx.arc(cx, player.y + 11, 12, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111827';
  ctx.fillRect(player.x + 5, player.y + 4, 25, 6);

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.fillStyle = '#111827';
  ctx.fillRect(0, -4, 38, 8);
  ctx.fillStyle = '#4b5563';
  ctx.fillRect(28, -2, 16, 4);
  ctx.restore();
}

function drawHeli(h) {
  ctx.save();
  ctx.translate(h.x + h.w/2, h.y + h.h/2);
  if (h.vx > 0) ctx.scale(-1, 1);
  ctx.fillStyle = '#334155';
  ctx.fillRect(-42, -14, 72, 28);
  ctx.fillStyle = '#0f172a';
  ctx.beginPath(); ctx.arc(22, 0, 18, -Math.PI/2, Math.PI/2); ctx.fill();
  ctx.fillStyle = '#93c5fd';
  ctx.fillRect(5, -8, 20, 12);
  ctx.strokeStyle = '#111827';
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(-55, -22); ctx.lineTo(45, -22); ctx.stroke();
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-70, 0); ctx.lineTo(-42, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-75, -9); ctx.lineTo(-75, 9); ctx.stroke();
  ctx.fillStyle = '#111827';
  ctx.fillRect(-15, 14, 40, 5);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Background hills/clouds
  ctx.fillStyle = 'rgba(255,255,255,.75)';
  for (let i = 0; i < 4; i++) {
    const x = (i * 260 + (score * 0.05 % 260));
    ctx.beginPath(); ctx.arc(x, 80 + i * 22, 28, 0, Math.PI*2); ctx.arc(x+35, 75+i*22, 34, 0, Math.PI*2); ctx.arc(x+70, 82+i*22, 25, 0, Math.PI*2); ctx.fill();
  }

  ctx.fillStyle = '#3f532f';
  ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
  ctx.fillStyle = '#26391f';
  for (let x = 0; x < canvas.width; x += 38) ctx.fillRect(x, groundY + 28 + Math.sin(x)*4, 24, 6);

  drawSoldier();
  helis.forEach(drawHeli);

  ctx.fillStyle = '#fde047';
  bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill(); });
  ctx.fillStyle = '#ef4444';
  enemyBullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill(); });

  particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life / 50);
    ctx.fillStyle = '#f97316';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });

  ctx.fillStyle = 'rgba(15,23,42,.85)';
  ctx.fillRect(16, 14, 260, 82);
  ctx.fillStyle = 'white';
  ctx.font = '20px Arial';
  ctx.fillText('Score: ' + score, 30, 42);
  ctx.fillText('Wave: ' + wave, 30, 70);
  ctx.fillStyle = '#ef4444';
  ctx.fillRect(130, 56, 120, 14);
  ctx.fillStyle = '#22c55e';
  ctx.fillRect(130, 56, Math.max(0, player.hp) * 1.2, 14);
  ctx.strokeStyle = 'white';
  ctx.strokeRect(130, 56, 120, 14);

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,.65)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = 'white';
    ctx.font = '54px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('MISSION FAILED', canvas.width/2, 245);
    ctx.font = '24px Arial';
    ctx.fillText('Final Score: ' + score, canvas.width/2, 292);
    ctx.fillText('Press R to restart', canvas.width/2, 330);
    ctx.textAlign = 'left';
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
